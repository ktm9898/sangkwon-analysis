<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상권분석 | 최적 창업 입지 분석</title>
  <meta name="description" content="업종별 상권 범위와 경쟁업체 분석을 통해 최적의 창업 입지를 추천합니다.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="app-container">
    <!-- ===== Map Area ===== -->
    <div id="map-container">
      <div id="map"></div>

      <!-- Map Overlay Controls -->
      <div class="map-controls">
        <!-- 업종 선택 -->
        <div class="control-card">
          <div class="control-label">업종 선택</div>
          <div class="business-selector" id="business-selector"></div>
        </div>

        <!-- 선택한 좌표 -->
        <div class="control-card">
          <div class="control-label">분석 기준점</div>
          <div class="coord-display empty" id="coord-display">
            <span class="dot"></span>
            <span>지도를 클릭하여 기준점을 선택하세요</span>
          </div>
        </div>
      </div>

      <!-- 분석 시작 버튼 -->
      <button class="analyze-btn" id="analyze-btn" disabled>
        <span class="spinner"></span>
        <span class="btn-text">🔍 상권 분석 시작</span>
      </button>
    </div>

    <!-- ===== Sidebar ===== -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>📊 상권분석</h1>
        <p>최적 창업 입지를 찾아드립니다</p>
      </div>
      <div class="sidebar-body" id="sidebar-body">
        <!-- UiManager가 동적으로 렌더링 -->
      </div>
    </div>
  </div>

  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-card">
      <div class="loading-spinner"></div>
      <h3>분석 중...</h3>
      <p>잠시만 기다려주세요</p>
    </div>
  </div>

  <!-- 토스트 -->
  <div class="toast" id="toast"></div>

  <!-- ===== Scripts ===== -->
  <!-- 네이버 Maps JS v3 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=u5mtazxcnw"></script>

  <!-- Turf.js (공간 분석) -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>

  <!-- App Modules -->
  <script src="js/config.js"></script>
  <script src="js/map.js"></script>
  <script src="js/ui.js"></script>
  <!-- Phase 2 -->
  <script src="js/isochrone.js"></script>
  <script src="js/search.js"></script>
  <!-- Phase 4 -->
  <script src="js/analysis.js"></script>
  <script src="js/app.js"></script>

  <script>
    // 네이버 Maps 로드 후 앱 초기화
    document.addEventListener('DOMContentLoaded', () => {
      // naver.maps가 로드될 때까지 대기
      if (typeof naver !== 'undefined' && naver.maps) {
        App.init();
      } else {
        // 폴백: Maps API가 아직 로드되지 않았을 때
        const checkMaps = setInterval(() => {
          if (typeof naver !== 'undefined' && naver.maps) {
            clearInterval(checkMaps);
            App.init();
          }
        }, 100);

        // 10초 후에도 로드되지 않으면 에러
        setTimeout(() => {
          clearInterval(checkMaps);
          if (typeof naver === 'undefined' || !naver.maps) {
            document.getElementById('map').innerHTML = `
              <div style="
                display: flex; align-items: center; justify-content: center;
                height: 100%; background: #f5f6fa; color: #1a1d2e;
                font-family: 'Inter', sans-serif; text-align: center;
                padding: 40px;
              ">
                <div>
                  <div style="font-size: 48px; margin-bottom: 16px;">🗺️</div>
                  <h2 style="margin-bottom: 8px;">지도를 불러올 수 없습니다</h2>
                  <p style="color: #4a4e6a; font-size: 14px;">
                    네이버 Maps Client ID를 설정해주세요.<br>
                    <code style="background: #eef0f6; padding: 4px 8px; border-radius: 4px; font-size: 12px;">
                      index.html → ncpKeyId=YOUR_NAVER_MAP_CLIENT_ID
                    </code>
                  </p>
                </div>
              </div>
            `;
          }
        }, 10000);
      }
    });
  </script>

</body>
</html>
